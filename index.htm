<!DOCTYPE html>
<html>
<head>
<title>Prova</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A==" crossorigin=""/>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css"/>
<link rel="stylesheet" href="css/leaflet.awesome-markers.css"/>
<link rel="stylesheet" href="css/leaflet-sidebar.css"/>
<link rel="stylesheet" href="css/L.Control.Locate.min.css" />
<link rel="stylesheet" href="css/leaflet-control-credits.css" />
<link rel="stylesheet" href="css/leaflet.infoButton.css" />
<link rel="stylesheet" href="css/leaflet.timedimension.control.css" />
<style>
   html, body {
			height: 100%;
			margin: 0;
		}
   #map {
			width: 100%;
			height: 100%;
		}

#panel {
  border-radius: 25px;
  font-family:   Calibri, sans-serif;
  text-align: center;
  font:10pt;
  height: 300px;
  width: 300px;
  background: #fff;
  padding: 5px;
  position: fixed;
  top: 0;
  right: 0;
  margin: 10px 10px 50px 10px;
  z-index: 999
}

</style>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.js"></script>
<script src="js/leaflet-sidebar.js"></script>
<script src="js/leaflet.awesome-markers.min.js"></script>
<script src="js/L.Control.Locate.js" ></script>
<script src="js/choropleth.js"></script>
<script src="js/legendfuncts.js"></script>
<script src="js/leaflet-control-credits.js"></script>
<script src="js/leaflet.infoButton.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/iso8601-js-period@0.2.1/iso8601.min.js"></script>
<script src="js/leaflet.timedimension.min.js"></script>
<script src="js/leaflet.timedimension.choropleth.js"></script>
<script src="js/aux_sparkline.js"></script>
<script src=" data/comunioss.js"></script>
<script src=" data/timedata.js"></script>
<script src=" data/values.js"></script>



</head>
<body>

<div id='map'></div>
<div id='panel'></div>

<script>

var map = L.map("map", {
  zoom: 11,
  center: [ 42.085450051114599,12.219309083084427],
  timeDimension: true,
  timeDimensionControl: true,
  timeDimensionOptions: {
    currentTime: timedata[0],
    times: timedata
  }
});


L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
		attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
	}).addTo(map);




var getColorRT = function(id) {
  let value = values[id][map.timeDimension.getCurrentTimeIndex()];
  return value > 1.25
    ? "#800026"
    : value > 1.10
    ? "#BD0026"
    : value > 1
    ? "#E31A1C"
    : value > 0.8
    ? "#FC4E2A"
    : value > 0.6
    ? "#FD8D3C"
    : value > 0.4
    ? "#FEB24C"
    : value > 0.2
    ? "#FED976"
    : value > 0
    ? "#FED976"
    : "#FFEDA0";
};

var style = function(feature) {
  return {
    fillColor: getColorRT(feature.properties.id),
    weight: 2,
    opacity: 1,
    color: "black",
    dashArray: "3",
    fillOpacity: 0.3
  };
};

const dataLayer = L.geoJson(data, { style: style });

L.timeDimension.layer.choropleth(dataLayer, {}).addTo(map);

L.control.locate({strings: { title: "Si sono qui!" }}).addTo(map);

var infoButton = L.control.infoButton({linkTitle: 'Informazioni mappa', 
				       title: '<h4><strong>Informazioni mappe</strong></h4>',
				       html:'<br/>Osservatorio Bracciano per informare \
				             i cittadini mette a disposizione le informazioni sulla pandemia in corso \
				              un cruscotto.</p>'
                                             }).addTo(map);
	
L.controlCredits({
        	image: "./img/logo.png",
        	link: "https://braccianosmartlake.com/",
        	text: "Braccianosmartlake"

        }).addTo(map);

$(document).ready(function() {
  $('#panel').append('<button id="submit">Trends</button>');
});
</script>



</body>
</html>
