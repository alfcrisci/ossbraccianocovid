<html>

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css"/>

<style>
   html, body {
			height: 100%;
			margin: 0;
		}
   #map {
			width: 100%;
			height: 100%;
		}

#panel {
  border-radius: 25px;
  font-family:   Calibri, sans-serif;
  font:12pt;
  height: 60%;
  width: 250px;
  background: #fff;
  padding: 5px;
  position: fixed;
  top: 0;
  right: 0;
  margin: 10px 10px 50px 10px;
  z-index: 999
}

.tooltip {
  position: absolute;
  background: rgba(0, 0, 0, .7);
  color: #fff;
  padding: 1px 3px;
  font-size: 8px;
  white-space: nowrap;
  z-index: 1;
}

#ncbraspark {
  stroke: red;
  fill: blue;
}

#ncangspark {
  stroke: red;
  fill: blue;
}

#nctrevspark {
  stroke: red;
  fill: blue;
}

#nccanspark {
  stroke: red;
  fill: blue;
}

#ncmanzspark {
  stroke: red;
  fill: blue;
}
#sibraspark {
  stroke: red;
  fill: yellow;
}

#siangspark {
  stroke: red;
  fill: yellow;
}

#sitrevspark {
  stroke: red;
  fill: yellow;
}

#sicanspark {
  stroke: purple;
  fill: red;
}

#simanzspark {
  stroke: red;
  fill: yellow;
}


</style>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" crossorigin=""></script>
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.js"></script>
<script src="https://cdn.rawgit.com/fnando/sparkline/master/dist/sparkline.js"></script>
<script src="js/leaflet-sidebar.js"></script>
<script src="js/leaflet.awesome-markers.min.js"></script>
<script src="js/L.Control.Locate.js" ></script>
<script src="js/choropleth.js"></script>
<script src="js/legendfuncts.js"></script>
<script src="js/leaflet-control-credits.js"></script>
<script src="js/leaflet.infoButton.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/iso8601-js-period@0.2.1/iso8601.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/dateformat@3.0.3/lib/dateformat.js"></script>

<script src="js/leaflet.timedimension.choropleth.js"></script>

<script src="data/last_comlakebracciano.js"></script>
<script src="data/NC_vars.js"></script>
<script src="data/RT_vars.js"></script>
<script src="data/SI_vars.js"></script>
<script src="data/timesNC.js"></script>
<script src="data/timesRT.js"></script>
<script src="data/timesSI.js"></script>
<script src="data/valuesNC.js"></script>
<script src="data/valuesRT.js"></script>
<script src="data/valuesSI.js"></script>
</head>
<body>

<div id='map'></div>
<div id='panel'>
<center><h4>Soglia di incidenza</h4></center>
<center><svg id="sibraspark" class="btc" width="230" height="30" stroke-width="2" "></svg><br>Bracciano</center>
<center><svg id="siangspark" class="btc" width="230" height="30" stroke-width="2" "></svg><br>Anguillara</center>
<center><svg id="sitrevspark" class="btc" width="230" height="30" stroke-width="2" "></svg><br>Trevignano</center>
<center><svg id="sicanspark" class="btc" width="230" height="30" stroke-width="2" "></svg><br>Canale Monterano</center>
<center><svg id="simanzspark" class="btc" width="230" height="30" stroke-width="2""></svg><br>Manziana</center>
<br>
<center><p id="labcomune"><p></center>
<center><p id="datocomune"><p></center>
</div>

<script>

//////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

var Esri_WorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
	attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
});


var map= L.map('map', {
		center: [42.09,12.22],
		zoom: 11
	});


L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
		attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
	}).addTo(map);


//////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

var getColorSI = function(value) {
  return value > 100
    ? "red"
    : value > 75
    ? "orange"
    : value > 0.50
    ? "yellow"
    : value > 0.10
    ? "white"
    : value > 0
    ? "gray"
    : "gray";
};

var layer_incidenza = L.choropleth(datageojson, {
        valueProperty: 'SI_v',
        limits: [-3, 0, 50, 75,100,1000],
        scale: ['gray','white','yellow','orange','red'], // chroma.js scale - include as many as you like
	steps: 5, // number of breaks or steps in range
	mode: 'e', // q for quantile, e for equidistant, k for k-means
	 style: {
            color: '#fff', // border color
            weight: 2,
            fillOpacity: 0.6
        },
    onEachFeature: function (feature, layer) {
      layer.bindPopup(
	  '<strong>Comune<strong> : '  + feature.properties.COMUNE + '<br>' +
          '<strong>Nuovi casi<strong> : ' + feature.properties.NC_v + '<br>' +
          '<strong>Incidenza su popolazione (% pop) <strong> : ' + feature.properties.SI_v 
    )}
    }).addTo(map);

var layer_casi = L.choropleth(datageojson, {
        valueProperty: 'NC_v',
        scale: ['yellow','orange','red'], // chroma.js scale - include as many as you like
	steps: 5, // number of breaks or steps in range
	mode: 'q', // q for quantile, e for equidistant, k for k-means
	 style: {
            color: '#fff', // border color
            weight: 2,
            fillOpacity: 0.6
        },
    onEachFeature: function (feature, layer) {
      layer.bindPopup(
	  '<strong>Comune<strong> : '  + feature.properties.COMUNE + '<br>' +
          '<strong>Nuovi casi<strong> : ' + feature.properties.NC_v + '<br>' +
          '<strong>Incidenza su popolazione (% pop) <strong> : ' + feature.properties.SI_v  
    )}
    });


//////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

layer_casi.on('add', function () {
        // Need setTimeout so that we don't get multiple
        // onadd/onremove events raised
        setTimeout(function () {
            $('#legend_casi').show();
        });
    });

layer_casi.on('remove', function () {
        // Need setTimeout so that we don't get multiple
        // onadd/onremove events raised
        setTimeout(function () {
            $('#legend_casi').hide();
        });
    });

 layer_incidenza.on('add', function () {
        // Need setTimeout so that we don't get multiple
        // onadd/onremove events raised
        setTimeout(function () {
            $('#legend_incidenza').show();

        });
    });
 layer_incidenza.on('remove', function () {
        // Need setTimeout so that we don't get multiple
        // onadd/onremove events raised
        setTimeout(function () {
            $('#legend_incidenza').hide();
        });
    });

//////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

var baselayers = {  "Satellite EsriWorld": Esri_WorldImagery};

var layers = { 
	       [legend_for_choropleth_layer(layer_incidenza, 'Soglia di Incidenza (%)', '', 'legend_incidenza')]: layer_incidenza,
               [legend_for_choropleth_layer(layer_casi, 'Nuovi Casi', '', 'legend_casi')]: layer_casi,
             };

var layersControl = L.control.layers(baselayers, layers,{ position: "topleft",collapsed: true }).addTo(map);


L.control.locate({strings: { title: "Sono qui ora!" }}).addTo(map);

var infoButton = L.control.infoButton({linkTitle: 'Informazioni mappa', 
				       title: '<h4><strong>Informazioni mappe</strong></h4>',
				       html:'<br/>Questa dashboard visualizza le soglia di incidenza del Covid-19 nel territorio del Lago di Bracciano a livello di singolo comune. Ogni settimana rileviamo i dati relativi ai nuovi contagi diffusi dalla Asl Rm4. I dati vengono elaborati per verificare se i comuni superano o meno la soglia di 250 nuovi casi settimanali ogni 100.000 abitanti, che secondo il nuovo Dpdm varato dal governo Draghi autorizza i Presidenti delle Regioni a prendere misure ulteriori di contenimento, come, per esempio, la chiusura della scuole. Il dato rappresenta la percentuale di raggiungimento di questa soglia conseguito da ciascun comune nella settimana precedente: se il valore supera il 100% vuol dire che la soglia dei 250 nuovi casi per 100.000 abitanti è stata superata. Nella tabella a destra sono riportati le tendenze per ciascun comune.<br>\
<strong>Credits</strong>:\
Dati e elaborazioni da 30science Communications <br> Infodesign da IBE-CNR </p>'
                                             }).addTo(map);
	

/////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

var logo = L.control({position: 'bottomleft'});
logo.onAdd = function(map){
        var div = L.DomUtil.create('div', 'myclass');
        div.innerHTML= "<a href='https://braccianosmartlake.com'><img src='img/logo.png' style='width:100px;height:120px;'></a>";
        return div;
    };
logo.addTo(map);
/////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

sparkline.sparkline(document.querySelector("#sibraspark"), data_SI_Bracciano, options);
sparkline.sparkline(document.querySelector("#siangspark"), data_SI_Anguillara, options);
sparkline.sparkline(document.querySelector("#sitrevspark"),data_SI_Trevignano, options);
sparkline.sparkline(document.querySelector("#sicanspark"), data_SI_Canale, options);
sparkline.sparkline(document.querySelector("#simanzspark"), data_SI_Manziana, options);


</script>



</body>
</html>
