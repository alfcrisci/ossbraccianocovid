<body>

<div id='map'></div>
<div id='panel'>
<center><h4>Tasso di contagio</h4></center>
<center><svg id="rtbraspark" class="btc" width="180" height="30" stroke-width="2" "></svg>RT Bracciano</center>
<center><svg id="rtangspark" class="btc" width="180" height="30" stroke-width="2" "></svg>RT Anguillara</center>
<center><svg id="rttrevspark" class="btc" width="180" height="30" stroke-width="2" "></svg>RT Trevignano</center>
<center><svg id="rtcanspark" class="btc" width="180" height="30" stroke-width="2" "></svg>RT Canale M.</center>
<center><svg id="rtmanzspark" class="btc" width="180" height="30" stroke-width="2""></svg>RT Manziana</center>
<center><h4>Soglia di incidenza</h4></center>
<center><svg id="sibraspark"  class="btc" width="180" height="30" stroke-width="2" "></svg>SI Bracciano</center>
<center><svg id="siangspark"  class="btc" width="180" height="30" stroke-width="2" "></svg>SI Anguillara</center>
<center><svg id="sitrevspark" class="btc" width="180" height="30" stroke-width="2" "></svg>SI Trevignano</center>
<center><svg id="sicanspark"   class="btc" width="180" height="30" stroke-width="2" "></svg>SI Canale M.</center>
<center><svg id="simanzspark" class="btc" width="180" height="30" stroke-width="2""></svg>SI Manziana</center>
</div>

<script>

var map = L.map("map", {
  zoom: 11,
  center: [ 42.085450051114599,12.219309083084427],
  timeDimension: true,
  timeDimensionControl: true,
  timeDimensionOptions: {
    currentTime: timedata[0],
    times: timedata
  }
});


L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
		attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
	}).addTo(map);




var getColorRT = function(id) {
  let value = values[id][map.timeDimension.getCurrentTimeIndex()];
  return value > 1.25
    ? "#800026"
    : value > 1.10
    ? "#BD0026"
    : value > 1
    ? "#E31A1C"
    : value > 0.8
    ? "#FC4E2A"
    : value > 0.6
    ? "#FD8D3C"
    : value > 0.4
    ? "#FEB24C"
    : value > 0.2
    ? "#FED976"
    : value > 0
    ? "#FED976"
    : "#FFEDA0";
};

var style = function(feature) {
  return {
    fillColor: getColorRT(feature.properties.id),
    weight: 2,
    opacity: 1,
    color: "black",
    dashArray: "3",
    fillOpacity: 0.3
  };
};

const dataLayer = L.geoJson(data, { style: style });

L.timeDimension.layer.choropleth(dataLayer, {}).addTo(map);

L.control.locate({strings: { title: "Si sono qui!" }}).addTo(map);

var infoButton = L.control.infoButton({linkTitle: 'Informazioni mappa', 
				       title: '<h4><strong>Informazioni mappe</strong></h4>',
				       html:'<br/>Osservatorio Bracciano per informare \
				             i cittadini mette a disposizione le informazioni sulla pandemia in corso \
				              un cruscotto.</p>'
                                             }).addTo(map);
	
L.controlCredits({
        	image: "./img/logo.png",
        	link: "https://braccianosmartlake.com/",
        	text: "Braccianosmartlake"

        }).addTo(map);



sparkline.sparkline(document.querySelector("#rtbraspark"), btc, options);
sparkline.sparkline(document.querySelector("#rtangspark"), btc, options);
sparkline.sparkline(document.querySelector("#rttrevspark"), btc, options);
sparkline.sparkline(document.querySelector("#rtcanspark"), btc, options);
sparkline.sparkline(document.querySelector("#rtmanzspark"), btc, options);

sparkline.sparkline(document.querySelector("#sibraspark"), btc, options);
sparkline.sparkline(document.querySelector("#siangspark"), btc, options);
sparkline.sparkline(document.querySelector("#sitrevspark"), btc, options);
sparkline.sparkline(document.querySelector("#sicanspark"), btc, options);
sparkline.sparkline(document.querySelector("#simanzspark"), btc, options);

</script>
